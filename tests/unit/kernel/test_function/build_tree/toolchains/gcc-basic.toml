name = "gcc-basic"

[tools]
cc = "gcc-15"
cxx = "g++-15"
ar = "gcc-ar-15"
asm = "gcc-15"

[flags]
common = ["-O0", "-g3"]
c = ["-std=c23", "-Wall", "-Werror", "-Wextra", "-Wpedantic"]
cxx = ["-std=gnu++23", "-Wall", "-Werror", "-Wextra", "-Wpedantic"]
asm = []
link = []

[settings]
family = "gcc"
debug = true
optimization = "0"
warnings_as_errors = false
use_modules = false

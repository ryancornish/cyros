[test]
name   = "test_round_robin"
source = "test_round_robin.cpp"
config = "test_round_robin_config.hpp"

# Locked to linux_preempt, and pulls in the round_robin feature. round_robin
# depends on "time", so a time driver is required; since none is named here the
# runner falls back to "simulation" automatically (because features are present).
[components]
port     = "linux_preempt"
features = ["round_robin"]

[link]
system_libraries = ["gtest", "gtest_main", "pthread"]

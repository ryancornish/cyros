[profile]
name = "unit_test_coverage"
toolchain = "../toolchains/gcc-coverage.toml"
# config_header is intentionally omitted. Each test supplies its own via
# test.toml [test].config.

[layout]
source_root = "../../src"
output_root = "../../out"

[components]
port = "linux_boost"
# time_driver intentionally omitted. Each test supplies its own via
# test.toml [components].time_driver (if it needs one).

[features]
enable = []

[output]
archive = "libcortos.a"
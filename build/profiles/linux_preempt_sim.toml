[profile]
name = "linux_preempt_sim"
toolchain = "../toolchains/gcc-debug.toml"
config_header = "../configs/sim.hpp"

[layout]
source_root = "../../src"
output_root = "../../out"

[components]
port = "linux_preempt"
time_driver = "simulation"

[features]
enable = [
   "round_robin",
]

[output]
archive = "libcyros.a"